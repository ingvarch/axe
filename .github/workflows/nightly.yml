name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  check-changes:
    name: Check for new commits
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compare HEAD with nightly tag
        id: check
        run: |
          if git rev-parse nightly >/dev/null 2>&1; then
            NIGHTLY_SHA=$(git rev-parse nightly)
            HEAD_SHA=$(git rev-parse HEAD)
            if [ "$NIGHTLY_SHA" = "$HEAD_SHA" ]; then
              echo "No new commits since last nightly build"
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            else
              echo "New commits found"
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No nightly tag found, first nightly build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  build:
    name: Build (${{ matrix.artifact }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: axe-macos-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: axe-macos-amd64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: axe-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: axe-linux-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-nightly
      - name: Install cross-compile tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: cargo build --workspace --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C target/${{ matrix.target }}/release axe
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish nightly release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Delete existing nightly release
        run: gh release delete nightly --cleanup-tag --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create nightly release
        run: |
          DATE=$(date -u +%Y-%m-%d)
          SHA=$(git rev-parse --short=8 HEAD)
          gh release create nightly \
            artifacts/*.tar.gz \
            --title "Nightly Build ($DATE)" \
            --notes "Automated nightly build from \`main\` branch.

          **Commit:** \`$SHA\`
          **Date:** $DATE

          > This is a pre-release build and may be unstable." \
            --prerelease \
            --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
