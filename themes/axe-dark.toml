[base]
background = "#282c34"
foreground = "#abb2bf"

[ui]
panel_border = "#4c5263"
panel_border_active = "#61afef"
status_bar_bg = "#21252b"
status_bar_fg = "#abb2bf"
status_bar_key = "#828997"
overlay_border = "#61afef"
overlay_bg = "#282c34"
resize_border = "#e5c07b"
tree_selection_bg = "#323741"
